apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: k6-test
spec:
  parallelism: 4
  arguments: --out experimental-prometheus-rw
  runner:
    env:
      - name: K6_PROMETHEUS_RW_SERVER_URL
        value: "http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090/api/v1/write"
  script:
    configMap:
      name: 'k6-test'
      file: 'test.js'