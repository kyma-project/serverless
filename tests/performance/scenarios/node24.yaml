apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-test-nodejs24
  labels:
    test: performance
data:
  test.js: |
    import http from "k6/http";

    export const options = {
        vus: 100,
        duration: "2m",
    };

    export default function () {
        http.get("http://nodejs24.default.svc.cluster.local:80/");
    }