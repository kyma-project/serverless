apiVersion: serverless.kyma-project.io/v1alpha2
kind: Function
metadata:
  name: nodejs24
  labels:
    test: performance
    app: nodejs24
spec:
  replicas: 1
  runtime: nodejs24
  source:
    inline:
      dependencies: |
        {
          "dependencies": {}
        }
      source: |
        module.exports = {
          main: function(event, context) {
            return 'Hello World!'
          }
        }
---
## I'm not sure if we need this and if we should call function because this can disturbe the results of the test

