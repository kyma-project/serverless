apiVersion: batch/v1
kind: Job
metadata:
  name: k6-test
spec:
  backoffLimit: 0
  parallelism: 4
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: k6
        image: grafana/k6
        command: ["k6"]
        args:
          - run
          - --out
          - experimental-prometheus-rw
          - /scripts/test.js
        env:
          - name: K6_PROMETHEUS_RW_SERVER_URL
            value: "http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090/api/v1/write"
          - name: K6_PROMETHEUS_RW_TREND_STATS
            value: "avg,min,med,max,p(90),p(95),p(99.9),p(99.99),count"
        volumeMounts:
        - name: script
          mountPath: /scripts
        # resources:
        #   requests:
        #     cpu: "1"
        #     memory: "512Mi"
      volumes:
      - name: script
        configMap:
          name: k6-test