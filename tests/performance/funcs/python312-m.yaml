apiVersion: serverless.kyma-project.io/v1alpha2
kind: Function
metadata:
  name: python312-m
  labels:
    test: performance
    app: python312-m
spec:
  replicas: 1
  runtime: python312
  resourceConfiguration:
    function:
      profile: M
  source:
    inline:
      dependencies: ""
      source: |
        def main(event, context):
          print("Hello World!")
          return "Hello World!"
---
## I'm not sure if we need this and if we should call function because this can disturbe the results of the test

apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: python312-m
  labels:
    test: performance
spec:
  selector:
    matchLabels:
      serverless.kyma-project.io/function-name: python312-m
  podMetricsEndpoints:
  - portNumber: 8080
    path: /metrics
    interval: 5s
