apiVersion: serverless.kyma-project.io/v1alpha2
kind: Function
metadata:
  name: nodejs22-m
  labels:
    test: performance
    app: nodejs22-m
spec:
  replicas: 1
  runtime: nodejs22
  resourceConfiguration:
    function:
      profile: M
  source:
    inline:
      dependencies: |
        {
          "dependencies": {}
        }
      source: |
        module.exports = {
          main: function(event, context) {
            console.log("Hello World!");
            return 'Hello World!'
          }
        }
---
## I'm not sure if we need this and if we should call function because this can disturbe the results of the test

apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: nodejs22-m
  labels:
    test: performance
spec:
  selector:
    matchLabels:
      serverless.kyma-project.io/function-name: nodejs22-m
  podMetricsEndpoints:
  - portNumber: 8080
    path: /metrics
    interval: 5s
