apiVersion: v1
kind: ServiceAccount
metadata:
  name: performance-test-runner
  namespace: ${resource_namespace}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: performance-test-runner
rules:
- apiGroups: ["serverless.kyma-project.io"]
  resources: ["functions"]
  verbs: ["get", "list", "watch", "create", "patch", "delete"]
- apiGroups: ["monitoring.coreos.com"]
  resources: ["podmonitors"]
  verbs: ["get", "create", "patch", "delete"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "create", "patch", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: performance-test-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: performance-test-runner
subjects:
- kind: ServiceAccount
  name: performance-test-runner
  namespace: ${resource_namespace}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: performance-test-runner
  namespace: ${resource_namespace}
  labels:
    test: performance
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: performance-test-runner
      containers:
      - name: test-runner
        image: ${test_runner_image}
        imagePullPolicy: Always
        env:
        - name: NAMESPACE
          value: "${resource_namespace}"
        - name: SCENARIO
          value: "${scenario}"
