# Resource definitions for RBAC integration tests.
# Each entry is a sample Kubernetes manifest that will be used to verify
# CRUD permissions for the "edit" ClusterRole and read-only access for the "view" ClusterRole.

---
apiVersion: serverless.kyma-project.io/v1alpha2
kind: Function
metadata:
  name: rbac-test-fn
spec:
  runtime: nodejs22
  source:
    inline:
      source: |
        module.exports = { main: function(e,c){ return "hello" } }

---
apiVersion: operator.kyma-project.io/v1alpha1
kind: Serverless
metadata:
  name: rbac-test-svls
spec:
  dockerRegistry:
    enableInternal: false

