name: images verify
run-name: ${{github.event.pull_request.title}}

on:
  workflow_call:

jobs:
  # check if developer doesn't change `main` images in the values.yaml and component-config.yaml files
  verify-component-and-values-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout to main
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Export main images from the main ref
        run: |
          # export component-config.yaml images with the main tag as github env
          echo SSC_MAIN_IMAGES=$(yq '.images[] | select(contains(":main")) | sub(":.*", "")' component-config.yaml) >> $GITHUB_ENV

          # export values. images with the main tag as github env
          echo VALUES_MAIN_IMAGES=$(yq '.global.images[] | select(.version == "main") | .name' config/buildless-serverless/values.yaml) >> $GITHUB_ENV

      - name: Checkout to context
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Verify component-config.yaml images
        run: |
          PR_NOT_MAIN_IMAGES=$(yq '.images[] | select(contains(":main") | not ) | sub(":.*", "")' component-config.yaml) \
            .github/scripts/verify-image-changes.sh
        env:
          MAIN_IMAGES: ${{ env.SSC_MAIN_IMAGES }}

      - name: Verify values.yaml images
        run: |
          PR_NOT_MAIN_IMAGES=$(yq '.global.images[] | select(.version != "main") | .name' config/buildless-serverless/values.yaml) \
            .github/scripts/verify-image-changes.sh
        env:
          MAIN_IMAGES: ${{ env.VALUES_MAIN_IMAGES }}
