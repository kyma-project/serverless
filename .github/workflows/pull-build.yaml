name: pull-build
on:
  pull_request_target:
    branches:
      - main
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read # This is required for actions/checkout

jobs:
  select-environment:
    runs-on: ubuntu-latest
    environment: restricted
    #uncomment after gating is allowed - environment: ${{ github.event.pull_request.author_association != 'COLLABORATOR' && github.event.pull_request.author_association != 'OWNER' && 'restricted' || 'internal' }}
    steps:
      - name: Approved
        run: echo "Build approved, environment selected"

  builds:
    needs: select-environment
    uses: ./.github/workflows/_build.yaml
    permissions:
      id-token: write # This is required for requesting the JWT token
      contents: read # This is required for actions/checkout
    with:
      purpose: "dev"
      img_directory: "dev"
      img_version: PR-${{ github.event.number }}

  # Integration tests are intentionally disabled for pull_request_target.
  # actions/checkout@v7 blocks fork checkouts in pull_request_target by default (safer-pull_request_target-defaults).
  # Only the build job above runs here - it uses id-token to push images but does not expose secrets to untrusted fork code.
  # integrations:
  #   needs: builds
  #   uses: ./.github/workflows/_integration-tests.yaml
  #   with:
  #     img_directory: "dev"
  #     img_version: PR-${{ github.event.number }}
