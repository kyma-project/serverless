name: pull-build
on:
  pull_request_target:
    branches:
      - main
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read # This is required for actions/checkout

jobs:
  select-environment:
    runs-on: ubuntu-latest
    environment: restricted
    #uncomment after gating is allowed - environment: ${{ github.event.pull_request.author_association != 'COLLABORATOR' && github.event.pull_request.author_association != 'OWNER' && 'restricted' || 'internal' }}
    steps:
      - name: Approved
        run: echo "Build approved, environment selected"

  builds:
    needs: select-environment
    uses: kyma-project/serverless/.github/workflows/_build.yaml@main
    permissions:
      id-token: write # This is required for requesting the JWT token
      contents: read # This is required for actions/checkout
    with:
      purpose: "dev"
      img_directory: "dev"
      img_version: PR-${{ github.event.number }}

  integrations:
    needs: builds
    uses: kyma-project/serverless/.github/workflows/_integration-tests.yaml@main
    with:
      img_directory: "dev"
      img_version: PR-${{ github.event.number }}