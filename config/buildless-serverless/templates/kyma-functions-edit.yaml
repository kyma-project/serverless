# permissions for end users to edit functions.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: serverless-functions-editor-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: serverless
    app.kubernetes.io/part-of: serverless
    app.kubernetes.io/managed-by: helm
    kyma-project.io/module: serverless
  name: kyma-functions-edit
rules:
- apiGroups:
  - serverless.kyma-project.io
  resources:
  - functions
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - serverless.kyma-project.io
  resources:
  - functions/status
  verbs:
  - get
- apiGroups:
  - serverless.kyma-project.io
  resources:
  - functions/scale
  verbs:
  - get
  - patch
  - update

